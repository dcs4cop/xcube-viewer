apiVersion: networking.k8s.io/v1beta1
kind: Ingress
metadata:
  name: xcube-viewer-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    # use the shared ingress-nginx
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  tls:
    - secretName: {{ .Values.tlsSecretName }}
      hosts:
        - {{ .Values.hostName }}
  rules:
    - http:
        paths:
          - path: /api/(.*)
            backend:
              serviceName: xcube-api
              servicePort: 80
#    - http:
#        paths:
#          - path: /config.json
#            backend:
#              serviceName: xcube-api
#              servicePort: 80
    - http:
        paths:
          - path: /
            backend:
              serviceName: xcube-viewer
              servicePort: 80
